<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sierra Azul · Bandeja de Mensajes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul-egeo: #004a7c;
      --azul-egeo-dark: #00365a;
      --celeste-agua: #89cff0;
      --celeste-claro: #d0e9f7;
      --verde-vivo: #22c55e;
      --amarillo-urgente: #f59e0b;
      --rojo-critico: #ef4444;
      --surface-bg: #f7f9fb;
      --surface-card: #ffffff;
      --surface-mid: #eceef0;
      --border-soft: #e0e3e5;
      --texto-principal: #191c1e;
      --texto-secundario: #6b7280;
      --texto-placeholder: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface-bg);
      color: var(--texto-principal);
      margin: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
    }
    .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #c3c6d6; border-radius: 99px; }

    .tile { transition: background 150ms ease; }
    .chip { transition: background 150ms ease, color 150ms ease; }
    .ia-track { transition: background 200ms ease; }
    .ia-knob { transition: transform 200ms ease; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px;
      color: var(--texto-secundario);
      border-left: 3px solid transparent;
      cursor: pointer; transition: background 150ms ease, color 150ms ease;
      font-size: 14px; font-weight: 500;
    }
    .nav-item:hover { background: var(--surface-mid); color: var(--texto-principal); }
    .nav-item.active {
      background: rgba(0,74,124,0.08);
      color: var(--azul-egeo);
      border-left-color: var(--azul-egeo);
      font-weight: 700;
    }

    textarea { font-family: inherit; }

    @media (max-width: 900px) {
      #sidebar { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="flex h-screen overflow-hidden">

    <!-- COLUMNA 1 — SIDEBAR -->
    <nav id="sidebar" class="w-[280px] shrink-0 bg-white border-r flex flex-col py-4 gap-4" style="border-color: var(--border-soft);">
      <div class="px-4 flex items-center gap-3">
        <div class="w-10 h-10 shrink-0" style="border-radius: 10px; overflow: hidden;">
          <svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="var(--azul-egeo)" />
            <path d="M20 7 C20 7 11 18 11 25 a9 9 0 0 0 18 0 C29 18 20 7 20 7 Z" fill="var(--celeste-agua)" opacity="0.35" />
            <text x="20" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#ffffff">SA</text>
          </svg>
        </div>
        <div>
          <h1 class="font-extrabold leading-tight" style="color: var(--azul-egeo); font-size: 18px;">Sierra Azul</h1>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="w-2 h-2 rounded-full" style="background: var(--verde-vivo);"></span>
            <span style="color: var(--texto-secundario); font-size: 11px;">9:30 - 19:30h | En Línea</span>
          </div>
        </div>
      </div>

      <div class="px-4">
        <button id="btn-campanas" class="w-full text-white font-semibold rounded-lg py-2.5 px-4 flex items-center justify-center gap-2 text-sm transition-colors"
          style="background: var(--azul-egeo);"
          onmouseover="this.style.background='var(--azul-egeo-dark)'" onmouseout="this.style.background='var(--azul-egeo)'">
          <span class="material-symbols-outlined text-[18px]">campaign</span>
          Campañas de remarketing
        </button>
      </div>

      <div class="flex-1 px-3 mt-2 flex flex-col gap-1">
        <div class="nav-item active">
          <span class="material-symbols-outlined icon-fill">inbox</span>
          <span>Inbox</span>
          <span id="inbox-badge" class="ml-auto text-white rounded-full px-2 py-0.5 text-[11px] font-bold" style="background: var(--azul-egeo);">0</span>
        </div>
        <div class="nav-item">
          <span class="material-symbols-outlined">water_drop</span>
          <span>Pedidos</span>
        </div>
        <div class="nav-item">
          <span class="material-symbols-outlined">leaderboard</span>
          <span>Analytics</span>
        </div>
        <div class="nav-item">
          <span class="material-symbols-outlined">group</span>
          <span>Agentes</span>
        </div>
      </div>

      <div class="px-3 mt-auto">
        <div class="nav-item">
          <span class="material-symbols-outlined">settings</span>
          <span>Configuración</span>
        </div>
      </div>
    </nav>

    <!-- COLUMNA 2 — CHAT LIST -->
    <aside id="chat-list" class="w-[360px] shrink-0 bg-white border-r flex flex-col" style="border-color: var(--border-soft);">
      <div class="p-4 border-b shrink-0" style="border-color: var(--border-soft);">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg" style="color: var(--texto-principal);">Mensajes</h2>
          <button class="p-1.5 rounded-full transition-colors" style="color: var(--texto-secundario);"
            onmouseover="this.style.background='var(--surface-mid)'" onmouseout="this.style.background='transparent'">
            <span class="material-symbols-outlined">filter_list</span>
          </button>
        </div>

        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color: var(--texto-placeholder);">search</span>
          <input id="search-input" type="text" placeholder="Buscar cliente o chat..."
            class="w-full rounded-lg pl-10 pr-4 py-2 text-sm border outline-none transition-all"
            style="background: var(--surface-bg); border-color: var(--border-soft); color: var(--texto-principal);"
            onfocus="this.style.borderColor='var(--azul-egeo)'; this.style.background='#fff';"
            onblur="this.style.borderColor='var(--border-soft)'; this.style.background='var(--surface-bg)';" />
        </div>

        <div id="filter-chips" class="flex gap-2 mt-4 overflow-x-auto custom-scroll pb-1"></div>
      </div>

      <div id="tiles" class="flex-1 overflow-y-auto custom-scroll"></div>
    </aside>

    <!-- COLUMNA 3 — CHAT WINDOW -->
    <section id="chat-window" class="flex-1 flex flex-col min-w-0" style="background: var(--surface-bg);">
      <header id="chat-header" class="h-[72px] shrink-0 px-4 flex items-center justify-between border-b bg-white" style="border-color: var(--border-soft);"></header>

      <div id="messages" class="flex-1 overflow-y-auto custom-scroll p-4 flex flex-col gap-3" style="background: #f0f4f8;"></div>

      <footer id="composer" class="relative bg-white border-t p-3 px-4 shrink-0" style="border-color: var(--border-soft);">
        <div id="hsm-panel" class="hidden absolute left-4 right-4 bottom-full mb-2 bg-white rounded-xl border shadow-xl overflow-hidden" style="border-color: var(--border-soft);">
          <div class="px-4 py-2.5 border-b text-xs font-bold" style="border-color: var(--border-soft); color: var(--texto-secundario);">Plantillas HSM</div>
          <div id="hsm-list" class="max-h-72 overflow-y-auto custom-scroll"></div>
        </div>

        <div class="flex gap-2 mb-3">
          <button id="btn-hsm" class="flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-full border transition-colors"
            style="background: var(--celeste-claro); color: var(--azul-egeo); border-color: var(--celeste-agua);">
            <span class="material-symbols-outlined text-[16px]">description</span>
            Plantillas HSM
            <span class="material-symbols-outlined text-[16px]">arrow_drop_down</span>
          </button>
          <button class="flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-full border transition-colors"
            style="background: var(--surface-mid); color: var(--texto-secundario); border-color: var(--border-soft);">
            <span class="material-symbols-outlined text-[16px]">attach_file</span>
            Adjuntar
          </button>
        </div>

        <div class="flex items-end gap-2 rounded-xl border p-2 transition-all" style="background: var(--surface-bg); border-color: var(--border-soft);">
          <button class="p-2 rounded-full shrink-0 transition-colors" style="color: var(--texto-secundario);"
            onmouseover="this.style.background='var(--surface-mid)'" onmouseout="this.style.background='transparent'">
            <span class="material-symbols-outlined">sentiment_satisfied</span>
          </button>
          <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje..."
            class="flex-1 bg-transparent border-none outline-none resize-none text-sm py-2 custom-scroll"
            style="max-height: 96px; color: var(--texto-principal);"></textarea>
          <button id="btn-send" class="w-10 h-10 rounded-lg flex items-center justify-center text-white shrink-0 transition-colors"
            style="background: var(--azul-egeo);"
            onmouseover="this.style.background='var(--azul-egeo-dark)'" onmouseout="this.style.background='var(--azul-egeo)'">
            <span class="material-symbols-outlined text-[20px]">send</span>
          </button>
        </div>
      </footer>
    </section>

  </div>

  <script>
    const CHATS = [
      {
        id: 1,
        nombre: "Carlos Ruiz",
        telefono: "+51 959 349 049",
        avatar: "CR",
        tag: "Recargas",
        ultimoMensaje: "Hola, ¿cuándo llega mi pedido?",
        hora: "10:42 AM",
        noLeidos: 2,
        minutosRestantes: 720,
        iaActiva: true,
        mensajes: [
          { de: "cliente", texto: "Hola, ¿cuándo llega mi pedido de agua ozonizada?", hora: "10:42 AM" },
          { de: "agente", texto: "¡Hola Carlos! Tu pedido está en ruta. Llega en 45 minutos.", hora: "10:45 AM", leido: true }
        ]
      },
      {
        id: 2,
        nombre: "Elena Gómez",
        telefono: "+51 999 004 014",
        avatar: "EG",
        tag: "Pedidos Nuevos",
        ultimoMensaje: "Gracias por la entrega puntual",
        hora: "Ayer",
        noLeidos: 0,
        minutosRestantes: 120,
        iaActiva: false,
        mensajes: [
          { de: "cliente", texto: "Quiero pedir 2 bidones para mañana por favor", hora: "Ayer 3:10 PM" },
          { de: "agente", texto: "Claro Elena, confirmamos tu pedido para mañana en el horario de 9am a 1pm.", hora: "Ayer 3:12 PM", leido: true },
          { de: "cliente", texto: "Gracias por la entrega puntual", hora: "Ayer 5:30 PM" }
        ]
      },
      {
        id: 3,
        nombre: "José Quispe",
        telefono: "+51 987 654 321",
        avatar: "JQ",
        tag: "Consultas Distribuidores",
        ultimoMensaje: "¿Tienen precio especial para negocios?",
        hora: "Lun",
        noLeidos: 1,
        minutosRestantes: 30,
        iaActiva: true,
        mensajes: [
          { de: "cliente", texto: "Buenos días, tengo una bodega y quisiera saber si tienen precio especial para negocios", hora: "Lun 9:00 AM" },
          { de: "agente", texto: "¡Buenos días José! Sí trabajamos con precios para distribuidores. ¿Cuántos bidones necesitas por semana?", hora: "Lun 9:05 AM", leido: true },
          { de: "cliente", texto: "¿Tienen precio especial para negocios?", hora: "Lun 9:15 AM" }
        ]
      },
      {
        id: 4,
        nombre: "María Ccente",
        telefono: "+51 912 345 678",
        avatar: "MC",
        tag: "Recargas",
        ultimoMensaje: "Ok, espero el bidón entonces",
        hora: "Dom",
        noLeidos: 0,
        minutosRestantes: 0,
        iaActiva: false,
        mensajes: [
          { de: "cliente", texto: "Mi bidón está vacío, necesito recarga", hora: "Dom 2:00 PM" },
          { de: "agente", texto: "Hola María, pasamos por tu zona los domingos a partir de las 3pm. ¿Puedes esperar?", hora: "Dom 2:03 PM", leido: true },
          { de: "cliente", texto: "Ok, espero el bidón entonces", hora: "Dom 2:05 PM" }
        ]
      }
    ];

    const PLANTILLAS_HSM = [
      { nombre: "Confirmación de pedido", texto: "Hola {{nombre}}, tu pedido de {{cantidad}} bidón(es) fue confirmado. Llegará entre {{hora_inicio}} y {{hora_fin}}. Sierra Azul 💧" },
      { nombre: "Recordatorio de recarga", texto: "Hola {{nombre}}, notamos que hace {{dias}} días no realizas una recarga. ¿Necesitas agua ozonizada? Escríbenos al 959 349 049." },
      { nombre: "Seguimiento post-entrega", texto: "Hola {{nombre}}, ¿llegó bien tu pedido de Sierra Azul? Tu satisfacción es importante para nosotros." },
      { nombre: "Oferta primer bidón", texto: "Hola {{nombre}}, te ofrecemos tu primer bidón de agua ozonizada Sierra Azul a S/5. Calidad certificada, entrega a domicilio en Huanta." }
    ];

    const TAGS = ["Todos", "Pedidos Nuevos", "Recargas", "Consultas Distribuidores"];

    let chatActivoId = 1;
    let filtroActivo = "Todos";
    let textoBusqueda = "";

    const $ = (sel) => document.querySelector(sel);

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getChat(id) {
      return CHATS.find((c) => c.id === id);
    }

    function getWindowStyle(minutosRestantes) {
      if (minutosRestantes <= 0) return { texto: "Ventana cerrada", bg: "#fee2e2", color: "#b91c1c" };
      if (minutosRestantes <= 60) return { texto: minutosRestantes + "min restantes", bg: "#fee2e2", color: "#b91c1c" };
      if (minutosRestantes <= 360) return { texto: Math.floor(minutosRestantes / 60) + "h restantes", bg: "#fef3c7", color: "#b45309" };
      return { texto: Math.floor(minutosRestantes / 60) + "h restantes", bg: "#dcfce7", color: "#15803d" };
    }

    function horaActual() {
      const d = new Date();
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12;
      if (h === 0) h = 12;
      return h + ":" + m + " " + ampm;
    }

    function fechaSeparador(chat) {
      const h = chat.hora;
      if (h === "Ayer") return "Ayer";
      if (h === "Lun") return "Lunes";
      if (h === "Dom") return "Domingo";
      return "Hoy";
    }

    function actualizarInboxBadge() {
      const total = CHATS.reduce((acc, c) => acc + (c.noLeidos || 0), 0);
      $("#inbox-badge").textContent = total;
    }

    function renderFilterChips() {
      const cont = $("#filter-chips");
      cont.innerHTML = "";
      TAGS.forEach((tag) => {
        const activo = tag === filtroActivo;
        const btn = document.createElement("button");
        btn.className = "chip shrink-0 text-sm font-medium px-3 py-1.5 rounded-full border whitespace-nowrap";
        if (activo) {
          btn.style.background = "var(--azul-egeo)";
          btn.style.color = "#fff";
          btn.style.borderColor = "transparent";
        } else {
          btn.style.background = "var(--celeste-claro)";
          btn.style.color = "var(--azul-egeo)";
          btn.style.borderColor = "var(--celeste-agua)";
        }
        btn.textContent = tag;
        btn.addEventListener("click", () => filtrarPorChip(tag));
        cont.appendChild(btn);
      });
    }

    function renderChatList() {
      const cont = $("#tiles");
      cont.innerHTML = "";

      const q = textoBusqueda.trim().toLowerCase();
      const visibles = CHATS.filter((c) => {
        if (filtroActivo !== "Todos" && c.tag !== filtroActivo) return false;
        if (q) {
          const enNombre = c.nombre.toLowerCase().includes(q);
          const enMensaje = c.ultimoMensaje.toLowerCase().includes(q);
          if (!enNombre && !enMensaje) return false;
        }
        return true;
      });

      if (visibles.length === 0) {
        cont.innerHTML =
          '<div class="flex flex-col items-center justify-center h-48 gap-2" style="color: var(--texto-placeholder);">' +
          '<span class="material-symbols-outlined text-4xl">search_off</span>' +
          '<span class="text-sm">Sin resultados</span></div>';
        return;
      }

      visibles.forEach((c) => {
        const activo = c.id === chatActivoId;
        const win = getWindowStyle(c.minutosRestantes);

        const tile = document.createElement("div");
        tile.className = "tile cursor-pointer border-b px-4 py-3";
        tile.style.borderColor = "var(--border-soft)";
        tile.style.borderLeft = activo ? "3px solid var(--azul-egeo)" : "3px solid transparent";
        tile.style.background = activo ? "rgba(0,74,124,0.07)" : "transparent";
        if (!activo) {
          tile.addEventListener("mouseover", () => (tile.style.background = "var(--surface-mid)"));
          tile.addEventListener("mouseout", () => (tile.style.background = "transparent"));
        }

        const badge =
          c.noLeidos > 0
            ? '<span class="shrink-0 text-white text-[10px] font-bold rounded-full px-1.5 py-0.5 min-w-[18px] text-center leading-none" style="background: var(--azul-egeo);">' +
              c.noLeidos +
              "</span>"
            : "";

        tile.innerHTML =
          '<div class="flex items-center justify-between gap-2 mb-1">' +
            '<span class="font-bold text-sm truncate" style="color: var(--texto-principal);">' + escapeHtml(c.nombre) + "</span>" +
            '<span class="shrink-0 text-[11px]" style="color: var(--texto-secundario);">' + escapeHtml(c.hora) + "</span>" +
          "</div>" +
          '<div class="flex items-center justify-between gap-2 mb-2">' +
            '<span class="text-sm truncate" style="color: var(--texto-secundario);">' + escapeHtml(c.ultimoMensaje) + "</span>" +
            badge +
          "</div>" +
          '<div class="flex items-center gap-2">' +
            '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded inline-flex items-center gap-1" style="background:' + win.bg + ";color:" + win.color + ';">' +
              '<span class="material-symbols-outlined text-[12px]">timer</span>' + win.texto +
            "</span>" +
            '<span class="text-[10px] font-medium px-1.5 py-0.5 rounded" style="background: var(--celeste-claro); color: var(--azul-egeo);">' + escapeHtml(c.tag) + "</span>" +
          "</div>";

        tile.addEventListener("click", () => seleccionarChat(c.id));
        cont.appendChild(tile);
      });
    }

    function renderChatWindow() {
      const chat = getChat(chatActivoId);
      const header = $("#chat-header");
      const msgs = $("#messages");

      if (!chat) {
        header.innerHTML = "";
        msgs.innerHTML =
          '<div class="flex flex-col items-center justify-center h-full gap-3" style="color: var(--texto-placeholder);">' +
          '<span class="material-symbols-outlined text-5xl">chat_bubble_outline</span>' +
          '<span class="text-sm">Selecciona un chat para comenzar</span></div>';
        return;
      }

      const iaOn = chat.iaActiva;
      header.innerHTML =
        '<div class="flex items-center gap-3 min-w-0">' +
          '<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0" style="background: var(--celeste-claro); color: var(--azul-egeo);">' + escapeHtml(chat.avatar) + "</div>" +
          '<div class="min-w-0">' +
            '<div class="font-bold text-[15px] truncate" style="color: var(--texto-principal);">' + escapeHtml(chat.nombre) + "</div>" +
            '<div class="text-[13px] truncate" style="color: var(--texto-secundario);">' + escapeHtml(chat.telefono) + "</div>" +
          "</div>" +
        "</div>" +
        '<div class="flex items-center gap-3 shrink-0">' +
          '<button id="ia-toggle" class="flex items-center gap-2 px-3 py-1.5 rounded-full border" style="border-color: var(--border-soft);">' +
            '<span class="relative inline-block w-8 h-5 rounded-full ia-track" style="background:' + (iaOn ? "var(--verde-vivo)" : "var(--border-soft)") + ';">' +
              '<span class="ia-knob absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow" style="transform: translateX(' + (iaOn ? "12px" : "0") + ');"></span>' +
            "</span>" +
            '<span class="text-sm font-medium flex items-center gap-1" style="color:' + (iaOn ? "var(--verde-vivo)" : "var(--texto-secundario)") + ';">' +
              '<span class="material-symbols-outlined text-[16px] icon-fill">smart_toy</span>' + (iaOn ? "IA Activa" : "IA Pausada") +
            "</span>" +
          "</button>" +
          '<button class="p-2 rounded-full transition-colors" style="color: var(--texto-secundario);" onmouseover="this.style.background=\'var(--surface-mid)\'" onmouseout="this.style.background=\'transparent\'">' +
            '<span class="material-symbols-outlined">more_vert</span>' +
          "</button>" +
        "</div>";

      $("#ia-toggle").addEventListener("click", () => toggleIA(chat.id));

      let html =
        '<div class="flex justify-center my-1">' +
        '<span class="text-[11px] px-3 py-1 rounded-full bg-white border" style="border-color: var(--border-soft); color: var(--texto-secundario);">' +
        fechaSeparador(chat) + "</span></div>";

      chat.mensajes.forEach((m) => {
        const esAgente = m.de === "agente";
        if (esAgente) {
          const iconoIA = chat.iaActiva
            ? '<span class="material-symbols-outlined text-[14px]">smart_toy</span>'
            : "";
          const check = m.leido
            ? '<span class="material-symbols-outlined text-[14px]" style="color: var(--verde-vivo);">done_all</span>'
            : "";
          html +=
            '<div class="self-end max-w-[78%]">' +
              '<div class="px-3.5 py-2 text-white text-sm" style="background: var(--azul-egeo); border-radius: 16px; border-bottom-right-radius: 4px;">' +
                '<p class="whitespace-pre-wrap break-words leading-snug">' + escapeHtml(m.texto) + "</p>" +
                '<div class="flex items-center justify-end gap-1 mt-1" style="color: rgba(255,255,255,0.7);">' +
                  iconoIA +
                  '<span class="text-[10px] leading-none">' + escapeHtml(m.hora) + "</span>" +
                  check +
                "</div>" +
              "</div>" +
            "</div>";
        } else {
          html +=
            '<div class="self-start max-w-[78%]">' +
              '<div class="px-3.5 py-2 bg-white text-sm border" style="border-color: var(--border-soft); border-radius: 16px; border-bottom-left-radius: 4px; color: var(--texto-principal);">' +
                '<p class="whitespace-pre-wrap break-words leading-snug">' + escapeHtml(m.texto) + "</p>" +
                '<div class="flex justify-end mt-1">' +
                  '<span class="text-[10px] leading-none" style="color: var(--texto-secundario);">' + escapeHtml(m.hora) + "</span>" +
                "</div>" +
              "</div>" +
            "</div>";
        }
      });

      msgs.innerHTML = html;
      msgs.scrollTop = msgs.scrollHeight;
    }

    function seleccionarChat(id) {
      chatActivoId = id;
      cerrarPlantillas();
      renderChatList();
      renderChatWindow();
    }

    function toggleIA(chatId) {
      const chat = getChat(chatId);
      if (!chat) return;
      chat.iaActiva = !chat.iaActiva;
      renderChatWindow();
    }

    function filtrarPorChip(tag) {
      filtroActivo = tag;
      renderFilterChips();
      renderChatList();
    }

    function buscarChats(texto) {
      textoBusqueda = texto;
      renderChatList();
    }

    function enviarMensaje() {
      const input = $("#msg-input");
      const texto = input.value.trim();
      if (!texto) return;
      const chat = getChat(chatActivoId);
      if (!chat) return;

      chat.mensajes.push({ de: "agente", texto: texto, hora: horaActual(), leido: false });
      chat.ultimoMensaje = texto;
      chat.hora = horaActual();

      input.value = "";
      input.style.height = "auto";
      renderChatList();
      renderChatWindow();
      input.focus();
    }

    function renderPlantillas() {
      const list = $("#hsm-list");
      list.innerHTML = "";
      PLANTILLAS_HSM.forEach((p) => {
        const item = document.createElement("button");
        item.className = "w-full text-left px-4 py-3 border-b transition-colors";
        item.style.borderColor = "var(--border-soft)";
        item.addEventListener("mouseover", () => (item.style.background = "var(--surface-mid)"));
        item.addEventListener("mouseout", () => (item.style.background = "transparent"));
        item.innerHTML =
          '<div class="font-semibold text-sm mb-0.5" style="color: var(--texto-principal);">' + escapeHtml(p.nombre) + "</div>" +
          '<div class="text-xs line-clamp-2" style="color: var(--texto-secundario);">' + escapeHtml(p.texto) + "</div>";
        item.addEventListener("click", () => insertarPlantilla(p.texto));
        list.appendChild(item);
      });
    }

    function abrirPlantillas() {
      $("#hsm-panel").classList.remove("hidden");
    }

    function cerrarPlantillas() {
      $("#hsm-panel").classList.add("hidden");
    }

    function insertarPlantilla(texto) {
      const input = $("#msg-input");
      input.value = texto;
      cerrarPlantillas();
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 96) + "px";
      input.focus();
    }

    function init() {
      renderFilterChips();
      renderChatList();
      renderChatWindow();
      renderPlantillas();
      actualizarInboxBadge();

      $("#search-input").addEventListener("input", (e) => buscarChats(e.target.value));

      const input = $("#msg-input");
      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 96) + "px";
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          enviarMensaje();
        }
      });

      $("#btn-send").addEventListener("click", enviarMensaje);

      $("#btn-hsm").addEventListener("click", (e) => {
        e.stopPropagation();
        const oculto = $("#hsm-panel").classList.contains("hidden");
        if (oculto) abrirPlantillas();
        else cerrarPlantillas();
      });

      document.addEventListener("click", (e) => {
        const panel = $("#hsm-panel");
        const btn = $("#btn-hsm");
        if (!panel.contains(e.target) && !btn.contains(e.target)) cerrarPlantillas();
      });
    }

    init();
  </script>
</body>
</html>
